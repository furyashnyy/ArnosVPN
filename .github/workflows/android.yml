name: android

# Builds the ArnosVPN Android app and commits the release APK to
# apps/android/build/ so it ships alongside the source. GitHub-hosted runners
# can reach Google's Android repositories, so the real APK is produced here.
#
# The commit-back uses "[skip ci]" so it never re-triggers this workflow.

on:
  push:
    paths:
      - 'apps/android/**'
      - '!apps/android/build/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Unit tests (Go/Kotlin protocol vectors)
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Assemble release APK
        env:
          ARNOS_KEYSTORE_BASE64: ${{ secrets.ARNOS_KEYSTORE_BASE64 }}
          ARNOS_KEYSTORE_PASSWORD: ${{ secrets.ARNOS_KEYSTORE_PASSWORD }}
          ARNOS_KEY_ALIAS: ${{ secrets.ARNOS_KEY_ALIAS }}
          ARNOS_KEY_PASSWORD: ${{ secrets.ARNOS_KEY_PASSWORD }}
        run: |
          if [ -n "$ARNOS_KEYSTORE_BASE64" ]; then
            echo "$ARNOS_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            export ARNOS_KEYSTORE_FILE="$RUNNER_TEMP/release.jks"
            echo "Signing with the configured release key."
          else
            echo "::warning::ARNOS_KEYSTORE_BASE64 not set — building a debug-signed APK (not for distribution). See RELEASING.md."
          fi
          ./gradlew :app:assembleRelease --no-daemon

      - name: Stage APK into apps/android/build
        run: |
          mkdir -p build
          cp app/build/outputs/apk/release/app-release.apk build/arnosvpn-release.apk
          ls -l build/arnosvpn-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: arnosvpn-release-apk
          path: apps/android/build/arnosvpn-release.apk

      - name: Commit APK back to the branch
        working-directory: .
        env:
          ARNOS_KEYSTORE_BASE64: ${{ secrets.ARNOS_KEYSTORE_BASE64 }}
        run: |
          # Only publish the in-repo APK when it was signed with the real release
          # key. A debug-signed APK must never be committed as the release build.
          if [ -z "$ARNOS_KEYSTORE_BASE64" ]; then
            echo "No release signing key configured — skipping commit-back of the APK."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f apps/android/build/arnosvpn-release.apk
          if git diff --cached --quiet; then
            echo "APK unchanged; nothing to commit."
          else
            git commit -m "ci: build ArnosVPN release APK [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
