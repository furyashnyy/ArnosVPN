name: android

# Builds the ArnoVPN Android app and commits the release APK to
# apps/android/build/ so it ships alongside the source. GitHub-hosted runners
# can reach Google's Android repositories, so the real APK is produced here.
#
# The commit-back uses "[skip ci]" so it never re-triggers this workflow.

on:
  push:
    paths:
      - 'apps/android/**'
      - '!apps/android/build/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Unit tests (Go/Kotlin protocol vectors)
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Assemble release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Stage APK into apps/android/build
        run: |
          mkdir -p build
          cp app/build/outputs/apk/release/app-release.apk build/arnovpn-release.apk
          ls -l build/arnovpn-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: arnovpn-release-apk
          path: apps/android/build/arnovpn-release.apk

      - name: Commit APK back to the branch
        working-directory: .
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f apps/android/build/arnovpn-release.apk
          if git diff --cached --quiet; then
            echo "APK unchanged; nothing to commit."
          else
            git commit -m "ci: build ArnoVPN release APK [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
