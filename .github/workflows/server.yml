name: server

on:
  push:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/server.yml'
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race

      - name: Build binaries
        run: |
          go build -o /dev/null ./cmd/arnosvpn-server
          go build -o /dev/null ./cmd/arnosvpnctl

      - name: Build Docker image
        run: docker build -t arnosvpn:ci .
