# ArnosVPN — standalone Docker Compose deployment.
#
# ArnosVPN owns port 443 and terminates TLS itself, obtaining its own
# certificate from Let's Encrypt for ARNOS_DOMAIN. Use this on a plain VPS where
# nothing else is on 443 (no Coolify/Traefik in front).
#
#   1. Point ARNOS_DOMAIN's DNS A/AAAA record at this host.
#   2. Make sure port 443 is free and reachable from the internet.
#   3. cp .env.example .env  &&  edit ARNOS_DOMAIN (+ ARNOS_ACME_EMAIL).
#   4. docker compose up -d --build
#   5. docker compose logs -f   # prints the arnos:// connect URI and a QR code
#
# Built locally, never pushed to a registry (no `image:` tag).
#
# Behind Coolify/Traefik instead? Use docker-compose-coolify.yaml.

services:
  arnosvpn:
    build: .
    restart: unless-stopped

    # Required to create the TUN device and program NAT.
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1

    # ArnosVPN answers HTTPS/WSS on 443 directly.
    ports:
      - "443:443"

    environment:
      # Public domain clients dial; the Let's Encrypt cert is issued for it.
      ARNOS_DOMAIN: ${ARNOS_DOMAIN:?set ARNOS_DOMAIN}
      # We terminate TLS ourselves...
      ARNOS_TLS_MODE: "self"
      # ...using a certificate we obtain from Let's Encrypt.
      CERT_PROVIDER: ${CERT_PROVIDER:-letsencrypt}
      # Contact e-mail for the ACME account (recommended by Let's Encrypt).
      ARNOS_ACME_EMAIL: ${ARNOS_ACME_EMAIL:-}
      # Bind and advertise the standard HTTPS port.
      ARNOS_LISTEN: ":443"
      ARNOS_PUBLIC_PORT: "443"
      # Optional: pin a pre-shared key; otherwise one is generated into /data.
      ARNOS_PSK: ${ARNOS_PSK:-}

    volumes:
      - arnos-data:/data

    # The image's default health check targets the proxy-mode port (8443) over
    # plain HTTP; here we serve HTTPS on 443, so disable it to avoid a spurious
    # "unhealthy" status.
    healthcheck:
      disable: true

volumes:
  arnos-data:
