# ArnosVPN — private, single-user, Coolify-friendly compose file.
#
# Built locally, never pushed to a registry (no `image:` tag).
#
# Default = PROXY MODE (recommended for Coolify): ArnosVPN listens on an
# internal port and Coolify's Traefik terminates TLS for your domain and
# forwards the (HTTPS-looking) WebSocket to it. This is exactly the "expose"
# workflow — you do NOT publish host 443, so there is no conflict with the port
# Coolify's proxy already owns, and SSL is the certificate Traefik/Let's Encrypt
# already manages for your domain.
#
# In Coolify: set a domain for this service and point its "Ports Exposes" at the
# internal port below (8443). Nothing else to configure.

services:
  arnosvpn:
    build: .
    restart: unless-stopped

    # Required to create the TUN device and program NAT.
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1

    # Internal port Coolify's Traefik proxies to. Not published on the host, so
    # it never collides with 443.
    expose:
      - "8443"

    environment:
      # The public domain clients dial (Coolify's Traefik answers on 443 for it).
      ARNOS_DOMAIN: ${ARNOS_DOMAIN:?set ARNOS_DOMAIN}
      # proxy = Coolify/Traefik terminates TLS (default). self = ArnosVPN does.
      ARNOS_TLS_MODE: ${ARNOS_TLS_MODE:-proxy}
      # Internal bind. Fixed so Coolify's "expose" always knows where to route.
      ARNOS_LISTEN: ":8443"
      # What clients dial publicly (goes into the connect URI/QR).
      ARNOS_PUBLIC_PORT: "443"
      # Optional: pin a pre-shared key; otherwise one is generated into /data.
      ARNOS_PSK: ${ARNOS_PSK:-}

    volumes:
      - arnos-data:/data

    # ---------------------------------------------------------------------
    # ALTERNATIVE — "random published port, but with SSL" (self mode).
    # ArnosVPN terminates TLS itself using the certificate Traefik already has
    # in acme.json, on a host port Docker assigns at random (short `ports`
    # syntax with only a container port publishes to a random host port).
    # Set ARNOS_TLS_MODE=self, mount acme.json, and set ARNOS_PUBLIC_PORT to the
    # random host port Docker chose (see `docker compose port arnosvpn 8443`).
    #
    # ports:
    #   - "8443"                       # -> random host port, container :8443
    # environment then also needs:
    #   ARNOS_TLS_MODE: "self"
    #   CERT_PROVIDER: "traefik"
    #   ARNOS_TRAEFIK_ACME: "/traefik/acme.json"
    # volumes then also needs:
    #   - ${TRAEFIK_ACME_PATH:-/data/coolify/proxy/acme.json}:/traefik/acme.json:ro
    # ---------------------------------------------------------------------

volumes:
  arnos-data:
