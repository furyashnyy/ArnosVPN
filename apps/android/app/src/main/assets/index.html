<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>ArnosVPN</title>
<style>
  :root{
    --bg:#eef0f6; --bg2:#f6f7fb; --panel:#ffffff; --panel2:#f2f4fa; --line:#e2e6f0;
    --text:#1a1f2e; --muted:#6b7590; --primary:#3b5bff; --primary2:#2e6be6;
    --green:#16a34a; --amber:#d97706; --red:#dc2626;
  }
  :root[data-theme="dark"]{
    --bg:#0f1220; --bg2:#151a30; --panel:#1a1f36; --panel2:#10152b; --line:#28304f;
    --text:#eef1f8; --muted:#8b93b0; --primary:#3b5bff; --primary2:#5b74ff;
    --green:#22c55e; --amber:#f59e0b; --red:#ef4444;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,system-ui,sans-serif;
    background:var(--bg);color:var(--text);overflow:hidden;
    -webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none}
  /* Keep text selectable only in real text/input fields (per request). */
  input,textarea,select,[contenteditable="true"]{
    -webkit-user-select:text;-moz-user-select:text;user-select:text;-webkit-touch-callout:default}
  button,input,select{font:inherit;color:inherit}
  /* No blue focus/selection outline on tap; keyboard focus still shows a ring. */
  button:focus:not(:focus-visible){outline:none}
  button{cursor:pointer;border:none;background:none}
  .app{display:flex;height:100vh}

  /* Sidebar */
  .sidebar{width:232px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:18px 12px}
  .brand{display:flex;align-items:center;gap:10px;padding:8px 10px 18px;font-weight:800;font-size:19px;letter-spacing:-.4px}
  .brand svg{width:26px;height:26px;fill:var(--primary)}
  .nav{display:flex;flex-direction:column;gap:4px;flex:1}
  .nav a{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;
    color:var(--muted);text-decoration:none;font-size:14.5px;font-weight:600;transition:.15s}
  .nav a svg{width:19px;height:19px;fill:currentColor;opacity:.9}
  .nav a:hover{background:color-mix(in srgb,var(--primary) 12%,transparent);color:var(--text)}
  .nav a.active{background:color-mix(in srgb,var(--primary) 18%,transparent);color:var(--text)}
  .nav a.active svg{fill:var(--primary)}

  /* Main */
  .main{flex:1;overflow-y:auto;padding:26px 30px}
  .page-title{font-size:24px;font-weight:800;margin:0 0 20px;letter-spacing:-.4px}
  .page-title .crumb{color:var(--muted);font-weight:700}
  .back{background:none;color:var(--muted);font-size:22px;margin-right:8px}

  /* Cards / rows */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px}
  /* overflow must stay visible so custom dropdowns can escape the card */
  .rows{background:var(--panel);border:1px solid var(--line);border-radius:16px}
  .row{display:flex;align-items:center;gap:12px;padding:15px 18px;border-top:1px solid var(--line)}
  .row:first-child{border-top:none;border-radius:16px 16px 0 0}
  .row:last-child{border-radius:0 0 16px 16px}
  .rows .row:only-child{border-radius:16px}
  .row .grow{flex:1;min-width:0}
  .row .r-title{font-size:14.5px;font-weight:600}
  .row .r-sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .row.link{cursor:pointer;transition:.12s}
  .row.link:hover{background:color-mix(in srgb,var(--primary) 8%,transparent)}
  .row .chev{color:var(--muted);font-size:18px}
  .row.danger .r-title{color:var(--red)}
  .group-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;
    font-weight:700;margin:22px 4px 8px}

  /* Custom toggle */
  .tg{width:46px;height:26px;border-radius:20px;background:var(--line);position:relative;flex-shrink:0;transition:.2s}
  .tg::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;
    background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .tg.on{background:var(--primary)}
  .tg.on::after{transform:translateX(20px)}

  /* Custom select */
  .sel{position:relative;min-width:130px}
  .sel-btn{display:flex;align-items:center;gap:8px;justify-content:space-between;width:100%;
    background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px 12px;font-size:13.5px;font-weight:600}
  .sel-btn .car{color:var(--muted);font-size:11px}
  .sel-menu{position:absolute;right:0;top:calc(100% + 6px);min-width:100%;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:6px;z-index:60;box-shadow:0 12px 34px rgba(0,0,0,.22);display:none}
  .sel-menu.open{display:block}
  .sel-menu div{padding:9px 12px;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer}
  .sel-menu div:hover{background:color-mix(in srgb,var(--primary) 14%,transparent)}
  .sel-menu div.sel-active{color:var(--primary)}

  input.inp{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px 12px;
    font-size:13.5px;min-width:170px;outline:none}
  input.inp:focus{border-color:var(--primary)}

  /* Buttons */
  .btn{border-radius:12px;padding:11px 18px;font-size:14px;font-weight:700;background:var(--primary);color:#fff;transition:.15s}
  .btn:hover{background:var(--primary2)}
  .btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  .btn.ghost:hover{background:color-mix(in srgb,var(--primary) 12%,transparent)}
  .btn.danger{background:var(--red)}
  .btn.sm{padding:8px 14px;font-size:13px;border-radius:10px}

  /* Servers layout */
  .srv-grid{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}
  @media (max-width:900px){.srv-grid{grid-template-columns:1fr}}
  .search{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:13px;padding:11px 14px;margin-bottom:14px}
  .search input{flex:1;background:none;border:none;outline:none;font-size:14px}
  .search svg{width:18px;height:18px;fill:var(--muted)}
  .srv{display:flex;align-items:center;gap:13px;padding:15px 16px;border:1px solid var(--line);
    border-radius:14px;background:var(--panel);margin-bottom:10px;cursor:pointer;transition:.12s;position:relative}
  .srv:hover{border-color:color-mix(in srgb,var(--primary) 45%,var(--line))}
  .srv.active{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary) inset}
  .srv .dot{width:10px;height:10px;border-radius:50%;background:#3a4468;flex-shrink:0}
  .srv.active .dot{background:var(--green)}
  .srv .nm{font-weight:700;font-size:14.5px}
  .srv .hs{font-size:12.5px;color:var(--muted);margin-top:2px}
  .srv .ping{font-size:12px;color:var(--muted);font-weight:600}
  .srv .more{color:var(--muted);font-size:20px;padding:2px 8px;border-radius:8px}
  .srv .more:hover{background:color-mix(in srgb,var(--primary) 15%,transparent)}
  .empty{color:var(--muted);text-align:center;padding:50px 10px;font-size:14px}

  /* Connection panel */
  .conn{display:flex;flex-direction:column;align-items:center;gap:18px;padding:26px 20px}
  .power{width:150px;height:150px;border-radius:50%;display:grid;place-items:center;cursor:pointer;
    background:radial-gradient(circle at 50% 35%,var(--panel),var(--panel2));border:1px solid var(--line);
    box-shadow:0 0 0 12px color-mix(in srgb,var(--muted) 10%,transparent);transition:.3s}
  .power svg{width:56px;height:56px;fill:none;stroke:var(--muted);stroke-width:2.4;transition:.3s}
  .power.on{box-shadow:0 0 0 12px color-mix(in srgb,var(--green) 20%,transparent),0 0 42px color-mix(in srgb,var(--green) 40%,transparent)}
  .power.on svg{stroke:var(--green)}
  .power.connecting svg{stroke:var(--amber)}
  .power.err svg{stroke:var(--red)}
  .cstat{font-weight:800;font-size:18px}
  .cip{color:var(--muted);font-size:13px;min-height:18px}
  .seg{display:flex;gap:5px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:4px}
  .seg button{flex:1;padding:8px 16px;border-radius:9px;font-size:13px;font-weight:700;color:var(--muted)}
  .seg button.on{background:var(--primary);color:#fff}
  .conn-actions{display:flex;gap:10px}
  .conn-actions .btn{flex:1}

  /* Stat tiles */
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
  .tile{padding:20px}
  .tile .tl{font-size:12.5px;color:var(--muted);font-weight:600}
  .tile .tv{font-size:26px;font-weight:800;margin-top:6px;letter-spacing:-.5px}

  /* Logs */
  .logbox{background:#0a0d1a;border:1px solid var(--line);border-radius:14px;padding:14px 16px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;line-height:1.6;
    color:#c8d0ea;height:calc(100vh - 180px);overflow-y:auto;white-space:pre-wrap;word-break:break-word}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(5,8,20,.55);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:60}
  .overlay.open{display:flex}
  .modal{width:min(480px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:20px;
    padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .modal h3{margin:0 0 18px;font-size:19px;display:flex;justify-content:space-between;align-items:center}
  .modal h3 .x{color:var(--muted);font-size:22px;cursor:pointer}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:6px}
  .field input,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line);
    border-radius:11px;padding:11px 13px;font-size:14px;outline:none;resize:vertical}
  .field input:focus,.field textarea:focus{border-color:var(--primary)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

  /* Context menu */
  .ctx{position:fixed;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px;
    z-index:70;box-shadow:0 14px 40px rgba(0,0,0,.4);display:none;min-width:160px}
  .ctx.open{display:block}
  .ctx div{padding:9px 12px;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer}
  .ctx div:hover{background:color-mix(in srgb,var(--primary) 14%,transparent)}
  .ctx div.danger{color:var(--red)}

  /* Toast */
  .toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px}
  .toast{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 18px;
    font-size:13.5px;font-weight:600;box-shadow:0 12px 34px rgba(0,0,0,.35);animation:pop .2s}
  .toast.err{border-color:var(--red)}
  @keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .mini{display:flex;gap:16px;color:var(--muted);font-size:12.5px}
  .mini b{color:var(--text)}

  /* ---- Mobile / Android adaptation: sidebar becomes a bottom tab bar ---- */
  @media (max-width:720px){
    .app{flex-direction:column}
    .sidebar{position:fixed;left:0;right:0;bottom:0;top:auto;width:auto;height:auto;
      flex-direction:row;padding:6px 6px calc(6px + env(safe-area-inset-bottom));
      border-right:none;border-top:1px solid var(--line);z-index:50;
      background:color-mix(in srgb,var(--bg2) 94%,transparent);backdrop-filter:blur(14px)}
    .brand{display:none}
    .sidebar .nav+.nav{display:none} /* hide the secondary "About" group */
    .nav{flex-direction:row;gap:2px}
    .nav a{flex:1;flex-direction:column;gap:3px;padding:7px 2px;border-radius:12px;
      font-size:10px;font-weight:600;text-align:center;justify-content:center;white-space:nowrap}
    .nav a svg{width:22px;height:22px}
    .main{padding:calc(16px + env(safe-area-inset-top)) 16px calc(86px + env(safe-area-inset-bottom))}
    .page-title{font-size:20px;margin-bottom:16px}
    .srv-grid{display:flex;flex-direction:column;gap:14px}
    .srv-grid>.card{order:-1;width:100%} /* connection panel: full-width hero above the list */
    .conn{gap:16px;padding:34px 18px}
    .power{width:152px;height:152px}
    .power svg{width:58px;height:58px}
    .cstat{font-size:19px}
    /* stretch the action controls to fill the hero block */
    .conn>.seg,.conn>.btn,.conn>.mini,.conn-actions{width:100%}
    .conn>.btn{padding:13px 18px}
    .empty{padding:32px 10px}
    .search{margin-bottom:0}
    .tiles{grid-template-columns:1fr 1fr;gap:12px}
    .tile{padding:16px}
    .tile .tv{font-size:22px}
    .group-label{margin:18px 4px 8px}
    /* modal actions must wrap so nothing bleeds off a narrow screen */
    .modal{border-radius:18px;padding:20px}
    .modal-actions{flex-wrap:wrap;gap:10px}
    .modal-actions .qr-scan{flex-basis:100%;order:3;margin:0}
    .logbox{height:calc(100vh - 220px)}
    .toasts{bottom:calc(90px + env(safe-area-inset-bottom));width:92vw}
    .sel-menu{max-height:52vh;overflow-y:auto}
    .ctx{max-width:80vw}
  }
</style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <svg viewBox="0 0 24 24"><path d="M12 2 4 5v6c0 5 3.4 8.7 8 10 4.6-1.3 8-5 8-10V5z"/></svg>
        ArnosVPN
      </div>
      <nav class="nav" id="nav">
        <a href="#/add"      data-r="add"><svg viewBox="0 0 24 24"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6z"/></svg>Добавить</a>
        <a href="#/servers"  data-r="servers"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 2c1.7 0 3.2 3 3.2 8s-1.5 8-3.2 8-3.2-3-3.2-8 1.5-8 3.2-8zM4.3 9h15.4M4.3 15h15.4"/></svg>Серверы</a>
        <a href="#/settings" data-r="settings"><svg viewBox="0 0 24 24"><path d="M12 8a4 4 0 100 8 4 4 0 000-8zm9 4-2 .5.5 2-2 1.7-1.8-1.1L14 18l-.5 2h-3L10 18l-1.7-.9L6.5 18l-2-1.7.5-2L3 12l2-.5-.5-2 2-1.7 1.8 1.1L10 6l.5-2h3L14 6l1.7.9L17.5 6l2 1.7-.5 2z"/></svg>Настройки</a>
        <a href="#/stats"    data-r="stats"><svg viewBox="0 0 24 24"><path d="M4 20V10m5 10V4m5 16v-7m5 7V8"/></svg>Статистика</a>
        <a href="#/logs"     data-r="logs"><svg viewBox="0 0 24 24"><path d="M5 4h14v16H5zM8 9h8M8 13h8M8 17h5"/></svg>Логи</a>
      </nav>
      <div class="nav" style="flex:0">
        <a href="#/about" data-r="about"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 5v2m0 3v5"/></svg>О программе</a>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="ctx" id="ctx"></div>
  <div class="toasts" id="toasts"></div>

<script>
// ---------- helpers ----------
const $ = (s,r=document)=>r.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
// Android bridge: the native side answers requests asynchronously (off the UI
// thread) and resolves them back here by id, so slow calls (ping, subscription
// fetch) never freeze the WebView.
window.__arnosPending={};
window.__arnosBridgeResolve=function(id,payload){const p=window.__arnosPending[id];if(!p)return;
  delete window.__arnosPending[id];p(payload);};
async function api(path,opts){
  // On Android the same SPA runs inside a WebView with no HTTP server; a native
  // bridge answers the identical endpoints, wrapped as {ok,data}.
  if(window.ArnosBridge){
    const method=(opts&&opts.method)||"GET";const body=(opts&&opts.body)||"";
    const id=(Date.now().toString(36)+Math.random().toString(36).slice(2));
    const raw=await new Promise((res,rej)=>{window.__arnosPending[id]=res;
      try{window.ArnosBridge.request(id,method,path,body);}catch(e){delete window.__arnosPending[id];rej(new Error(e.message||"bridge error"));}});
    let r2;try{r2=JSON.parse(raw);}catch(e){throw new Error("bad bridge response");}
    if(!r2.ok)throw new Error(r2.error||"error");return r2.data;
  }
  const r=await fetch(path,opts);if(!r.ok)throw new Error(await r.text()||r.statusText);
  const ct=r.headers.get("content-type")||"";return ct.includes("json")?r.json():r.text();}
function toast(msg,err){const t=el("div","toast"+(err?" err":""),msg);$("#toasts").append(t);setTimeout(()=>t.remove(),3000);}
function fmtBytes(n){if(!n)return"0 B";const u=["B","KB","MB","GB","TB"];const i=Math.floor(Math.log(n)/Math.log(1024));
  return (n/Math.pow(1024,i)).toFixed(i?1:0)+" "+u[i];}
function fmtDur(sec){if(sec<=0)return"—";const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=Math.floor(sec%60);
  return (h?h+"ч ":"")+(m||h?m+"м ":"")+s+"с";}

let STATE={servers:[],connected:false};
let SETTINGS={};
let curMode="proxy";
let pings={};
// On Android the tunnel is always delivered via the system VpnService, so the
// desktop-only knobs (Proxy/TUN, SOCKS/HTTP addresses, LAN, system proxy…) are
// hidden and only controls that actually work on the phone are shown.
const IS_ANDROID=!!window.ArnosBridge;

async function refreshState(){try{STATE=await api("/api/state");curMode=curMode||STATE.mode||"proxy";}catch(e){}}
async function loadSettings(){try{SETTINGS=await api("/api/settings");curMode=SETTINGS.mode||"proxy";applyTheme(SETTINGS.theme);}catch(e){}}
function saveSettings(){return api("/api/settings",{method:"POST",body:JSON.stringify(SETTINGS)});}
function applyTheme(t){const root=document.documentElement;
  // Light is the base theme (no attribute); dark is an override. "system"
  // follows the OS preference, defaulting to light.
  if(t==="dark")root.setAttribute("data-theme","dark");
  else if(t==="light")root.removeAttribute("data-theme");
  else{const dark=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches;
    if(dark)root.setAttribute("data-theme","dark");else root.removeAttribute("data-theme");}}

// ---------- custom components ----------
function toggle(on,onChange){const t=el("div","tg"+(on?" on":""));t.onclick=()=>{on=!on;t.classList.toggle("on",on);onChange(on);};return t;}
function select(options,value,onChange){
  const wrap=el("div","sel");const cur=options.find(o=>o.v===value)||options[0];
  const btn=el("button","sel-btn",`<span>${cur?cur.t:""}</span><span class="car">▾</span>`);
  const menu=el("div","sel-menu");
  options.forEach(o=>{const d=el("div",o.v===value?"sel-active":"",o.t);d.onclick=(e)=>{e.stopPropagation();
    menu.classList.remove("open");btn.querySelector("span").textContent=o.t;onChange(o.v);};menu.append(d);});
  btn.onclick=(e)=>{e.stopPropagation();document.querySelectorAll(".sel-menu.open").forEach(m=>m!==menu&&m.classList.remove("open"));menu.classList.toggle("open");};
  wrap.append(btn,menu);return wrap;}
document.addEventListener("click",()=>document.querySelectorAll(".sel-menu.open").forEach(m=>m.classList.remove("open")));

function row(title,sub,control,onClick){
  const r=el("div","row"+(onClick?" link":""));
  r.append(el("div","grow",`<div class="r-title">${title}</div>`+(sub?`<div class="r-sub">${sub}</div>`:"")));
  if(control)r.append(control);
  if(onClick){const c=el("div","chev","›");r.append(c);r.onclick=onClick;}
  return r;}

function openModalEl(node){const o=$("#overlay");o.innerHTML="";o.append(node);o.classList.add("open");
  o.onclick=(e)=>{if(e.target===o)closeModal();};}
function closeModal(){$("#overlay").classList.remove("open");$("#overlay").innerHTML="";}

function ctxMenu(x,y,items){const c=$("#ctx");c.innerHTML="";items.forEach(it=>{const d=el("div",it.danger?"danger":"",it.label);
  d.onclick=()=>{c.classList.remove("open");it.fn();};c.append(d);});
  c.style.left=Math.min(x,innerWidth-180)+"px";c.style.top=y+"px";c.classList.add("open");}
document.addEventListener("click",()=>$("#ctx").classList.remove("open"));

// ---------- pages ----------
const main=()=>$("#main");
function setActiveNav(r){document.querySelectorAll(".nav a[data-r]").forEach(a=>a.classList.toggle("active",a.dataset.r===r));}

async function pageServers(){
  setActiveNav("servers");await refreshState();
  const m=main();m.innerHTML="";
  m.append(el("h1","page-title","Серверы"));
  const grid=el("div","srv-grid");

  // left: search + list
  const left=el("div");
  const search=el("div","search",`<svg viewBox="0 0 24 24"><path d="M10 4a6 6 0 104.5 10.3l4.6 4.6 1.4-1.4-4.6-4.6A6 6 0 0010 4z"/></svg>`);
  const si=el("input");si.placeholder="Введите текст для поиска";search.append(si);
  const list=el("div");
  function renderList(){list.innerHTML="";const q=si.value.toLowerCase();
    const items=STATE.servers.filter(s=>s.name.toLowerCase().includes(q)||(s.host||"").includes(q));
    if(items.length===0){list.append(el("div","empty","Нет серверов. Нажмите «Добавить», вставьте arnos://-ссылку или подписку."));return;}
    items.forEach(s=>{
      const c=el("div","srv"+(s.active?" active":""));
      c.append(el("div","dot"));
      c.append(el("div","grow",`<div class="nm">${s.name}</div><div class="hs">${s.host}:${s.port}</div>`));
      if(pings[s.name]!=null)c.append(el("div","ping",pings[s.name]+" мс"));
      const more=el("button","more","⋯");
      more.onclick=(e)=>{e.stopPropagation();ctxMenu(e.clientX,e.clientY,[
        {label:"Сделать активным",fn:()=>act(s.name)},
        {label:"Тест пинга",fn:()=>pingOne(s.name)},
        {label:"Удалить",danger:true,fn:()=>removeSrv(s.name)},
      ]);};
      c.append(more);
      c.onclick=()=>act(s.name);
      list.append(c);
    });}
  si.oninput=renderList;
  left.append(search,list);

  // right: connection
  const right=el("div","card");
  const conn=el("div","conn");
  const power=el("div","power");
  power.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 3v9" stroke-linecap="round"/><path d="M6.4 6.4a8 8 0 1011.2 0" stroke-linecap="round"/></svg>`;
  const cstat=el("div","cstat","Отключено");
  const cip=el("div","cip","");
  conn.append(power,cstat,cip);
  // Proxy/TUN switch is desktop-only (Android is always VpnService/TUN).
  if(!IS_ANDROID){
    const seg=el("div","seg");
    ["proxy","tun"].forEach(md=>{const b=el("button",curMode===md?"on":"",md==="proxy"?"Proxy":"TUN");
      b.onclick=()=>{curMode=md;SETTINGS.mode=md;saveSettings();[...seg.children].forEach(x=>x.classList.toggle("on",x===b));};seg.append(b);});
    conn.append(seg);
  }
  const pingBtn=el("button","btn ghost sm","Тест пинга");pingBtn.onclick=()=>pingOne(STATE.active);
  conn.append(pingBtn);
  // Quick access to routing controls right on the main screen.
  if(IS_ANDROID){
    const routeRow=el("div","conn-actions");
    const appsBtn=el("button","btn ghost sm","Приложения");appsBtn.onclick=()=>location.hash="#/apps";
    const domBtn=el("button","btn ghost sm","Сайты и домены");domBtn.onclick=()=>location.hash="#/domains";
    routeRow.append(appsBtn,domBtn);conn.append(routeRow);
  }
  const mini=el("div","mini","");
  power.onclick=onPower;
  conn.append(mini);
  right.append(conn);

  grid.append(left,right);m.append(grid);

  function paint(){
    const s=STATE;
    power.className="power"+(s.connected?" on":s.connecting?" connecting":s.error?" err":"");
    cstat.textContent=s.connecting?"Подключение…":s.connected?"Подключено":s.error?"Ошибка":"Отключено";
    cip.textContent=s.connected?("Выходной IP · "+s.assignedIP):(s.error||"");
    mini.innerHTML=s.connected?`<span>↓ <b>${fmtBytes(s.rx)}</b></span><span>↑ <b>${fmtBytes(s.tx)}</b></span>`:"";
    renderList();
  }
  paint();
  serversPaint=paint;
}
let serversPaint=null;

async function act(name){try{await api("/api/active",{method:"POST",body:JSON.stringify({name})});await refreshState();serversPaint&&serversPaint();}catch(e){toast(e.message,true);}}
async function removeSrv(name){try{await api("/api/remove",{method:"POST",body:JSON.stringify({name})});await refreshState();serversPaint&&serversPaint();toast("Удалено");}catch(e){toast(e.message,true);}}
async function pingOne(name){if(!name)return;toast("Пинг "+name+"…");try{const r=await api("/api/ping",{method:"POST",body:JSON.stringify({name})});
  if(r.ok){pings[name]=r.ms;toast(name+": "+r.ms+" мс");}else toast(name+": "+r.error,true);serversPaint&&serversPaint();}catch(e){toast(e.message,true);}}
async function onPower(){try{if(STATE.connected||STATE.connecting)await api("/api/disconnect",{method:"POST"});
  else await api("/api/connect",{method:"POST",body:JSON.stringify({mode:curMode})});
  await refreshState();serversPaint&&serversPaint();}catch(e){toast(e.message,true);}}

// Add modal
function pageAdd(){location.hash="#/servers";openAddModal();}
function openAddModal(){
  let type="config";
  const modal=el("div","modal");
  modal.append(el("h3",null,`Добавить конфигурацию<span class="x">✕</span>`));
  modal.querySelector(".x").onclick=closeModal;

  const typeField=el("div","field",`<label>Тип</label>`);
  typeField.append(select([
    {v:"config",t:"Конфигурация (arnos://)"},
    {v:"sub",t:"Подписка (URL)"},
  ],"config",v=>{type=v;valLabel.textContent=v==="sub"?"URL подписки":"arnos://-ссылка";}));
  const valField=el("div","field");
  const valLabel=el("label",null,"arnos://-ссылка");valField.append(valLabel);
  const ta=el("textarea");ta.rows=3;ta.placeholder="arnos://connect?host=…&psk=…";valField.append(ta);

  const actions=el("div","modal-actions");
  // On Android, offer QR scanning as a first-class way to provision.
  if(window.ArnosBridge){const qr=el("button","btn ghost qr-scan","Сканировать QR");
    qr.onclick=()=>{try{window.ArnosBridge.scanQR();}catch(e){}closeModal();};actions.append(qr);}
  const cancel=el("button","btn ghost","Отмена");cancel.onclick=closeModal;
  const save=el("button","btn","Сохранить");
  save.onclick=async()=>{const v=ta.value.trim();if(!v){toast("Пусто",true);return;}
    try{
      if(type==="sub"){const r=await api("/api/subscribe",{method:"POST",body:JSON.stringify({url:v})});toast("Добавлено серверов: "+r.added);}
      else{await api("/api/add",{method:"POST",body:JSON.stringify({uri:v})});toast("Сервер добавлен");}
      closeModal();await refreshState();serversPaint&&serversPaint();
    }catch(e){toast(e.message,true);}};
  actions.append(cancel,save);
  modal.append(typeField,valField,actions);
  openModalEl(modal);
}

  const m=main();m.innerHTML="";
  m.append(el("h1","page-title","Настройки"));

  m.append(el("div","group-label","Интерфейс"));
  const g1=el("div","rows");
  g1.append(row("Тема",null,select([{v:"system",t:"Системная"},{v:"light",t:"Светлая"},{v:"dark",t:"Тёмная"}],
    SETTINGS.theme||"system",v=>{SETTINGS.theme=v;applyTheme(v);saveSettings();})));
  m.append(g1);

  m.append(el("div","group-label","Настройки туннеля"));
  const g2=el("div","rows");
  if(!IS_ANDROID){
    g2.append(row("Режим",null,select([{v:"proxy",t:"Proxy"},{v:"tun",t:"TUN"}],SETTINGS.mode||"proxy",
      v=>{SETTINGS.mode=v;curMode=v;saveSettings();})));
    g2.append(inputRow("SOCKS-адрес",SETTINGS.socks,v=>{SETTINGS.socks=v;saveSettings();}));
    g2.append(inputRow("HTTP-прокси адрес",SETTINGS.http,v=>{SETTINGS.http=v;saveSettings();}));
  }
  g2.append(inputRow("DNS",SETTINGS.dns,v=>{SETTINGS.dns=v;saveSettings();}));
  if(!IS_ANDROID){
    g2.append(row("Предпочитаемый тип IP",null,select([{v:"auto",t:"Auto"},{v:"4",t:"IPv4"},{v:"6",t:"IPv6"}],
      SETTINGS.preferredIP||"auto",v=>{SETTINGS.preferredIP=v;saveSettings();})));
    g2.append(row("Разрешить подключения из LAN","Открыть прокси на 0.0.0.0",toggle(!!SETTINGS.allowLan,v=>{SETTINGS.allowLan=v;saveSettings();})));
  }
  m.append(g2);

  if(IS_ANDROID){
    m.append(el("div","group-label","Маршрутизация"));
    const gr=el("div","rows");
    gr.append(row("Приложения через VPN","Выбрать, какие приложения идут через VPN",null,()=>location.hash="#/apps"));
    gr.append(row("Сайты и домены","Пускать домены напрямую или через VPN",null,()=>location.hash="#/domains"));
    m.append(gr);
  }

  m.append(el("div","group-label","Дополнительно"));
  const g3=el("div","rows");
  if(!IS_ANDROID)g3.append(row("Дополнительные настройки",null,null,()=>location.hash="#/settings/advanced"));
  g3.append(row("Пинг","Проверить задержку до активного сервера",null,()=>pingOne(STATE.active)));
  m.append(g3);

  m.append(el("div","group-label","Другое"));
  const g4=el("div","rows");
  g4.append(row("Логи",null,null,()=>location.hash="#/logs"));
  const reset=row("Сброс","Удалить все серверы и настройки",null,async()=>{
    if(!confirm("Удалить все серверы и настройки?"))return;
    for(const s of (STATE.servers||[]))await api("/api/remove",{method:"POST",body:JSON.stringify({name:s.name})});
    SETTINGS=await api("/api/settings",{method:"POST",body:JSON.stringify({})});toast("Сброшено");await refreshState();});
  reset.classList.add("danger");g4.append(reset);
  m.append(g4);
}

  setActiveNav("stats");await refreshState();
  const m=main();m.innerHTML="";m.append(el("h1","page-title","Статистика"));

  const dur=STATE.connected&&STATE.since?Math.floor(Date.now()/1000-STATE.since):0;
  const tiles=[
    ["Состояние",STATE.connected?"Подключено":STATE.connecting?"Подключение…":"Отключено"],

  ];

let statsPaint=null;

  const m=main();m.innerHTML="";
  const h=el("h1","page-title","Логи");m.append(h);
  const bar=el("div",null);bar.style.cssText="display:flex;gap:10px;margin-bottom:14px";

// ---- Split tunneling: which apps use the VPN --------------------------------
async function pageApps(){
  setActiveNav("settings");await loadSettings();
  const m=main();m.innerHTML="";
  const h=el("h1","page-title");h.append(backBtn("#/settings"));h.append(document.createTextNode("Приложения"));m.append(h);

  let mode=SETTINGS.splitMode||"off";
  let chosen=new Set(SETTINGS.splitApps||[]);
  const persist=()=>{SETTINGS.splitMode=mode;SETTINGS.splitApps=[...chosen];saveSettings();};

  const g=el("div","rows");
  g.append(row("Режим",{off:"Все приложения через VPN",allowed:"Только выбранные",disallowed:"Все, кроме выбранных"}[mode],
    select([{v:"off",t:"Все приложения"},{v:"allowed",t:"Только выбранные"},{v:"disallowed",t:"Все, кроме выбранных"}],
      mode,v=>{mode=v;persist();render();})));
  m.append(g);

  const hint=el("div","group-label","Приложения");m.append(hint);
  const search=el("div","search",`<svg viewBox="0 0 24 24"><path d="M10 4a6 6 0 104.5 10.3l4.6 4.6 1.4-1.4-4.6-4.6A6 6 0 0010 4z"/></svg>`);
  const si=el("input");si.placeholder="Поиск приложения";search.append(si);m.append(search);
  const listWrap=el("div","rows");m.append(listWrap);

  let apps=[];
  try{const r=await api("/api/apps");apps=r.apps||[];}catch(e){toast(e.message,true);}

  function render(){
    hint.style.display=mode==="off"?"none":"";
    search.style.display=mode==="off"?"none":"";
    listWrap.style.display=mode==="off"?"none":"";
    if(mode==="off"){listWrap.innerHTML="";return;}
    const q=si.value.toLowerCase();
    listWrap.innerHTML="";
    const items=apps.filter(a=>a.label.toLowerCase().includes(q)||a.package.toLowerCase().includes(q));
    if(items.length===0){listWrap.append(el("div","empty","Приложения не найдены."));return;}
    items.forEach(a=>{
      const t=toggle(chosen.has(a.package),on=>{if(on)chosen.add(a.package);else chosen.delete(a.package);persist();});
      listWrap.append(row(a.label,a.package,t));
    });
  }
  si.oninput=render;
  render();
}

// ---- Domain / host routing: direct or through the VPN ------------------------
async function pageDomains(){
  setActiveNav("settings");await loadSettings();
  const m=main();m.innerHTML="";
  const h=el("h1","page-title");h.append(backBtn("#/settings"));h.append(document.createTextNode("Сайты и домены"));m.append(h);

  let rules=(SETTINGS.domainRules||[]).slice();
  const persist=()=>{SETTINGS.domainRules=rules;saveSettings();};

  // Add bar: host input + action + button.
  const add=el("div","card");add.style.cssText="padding:16px;margin-bottom:16px";
  const f=el("div","field");f.append(el("label",null,"Домен или хост"));
  const inp=el("input");inp.placeholder="например, example.com";f.append(inp);
  let act="direct";
  const f2=el("div","field");f2.append(el("label",null,"Куда направить"));
  f2.append(select([{v:"direct",t:"Напрямую (мимо VPN)"},{v:"vpn",t:"Через VPN"}],"direct",v=>act=v));
  const addBtn=el("button","btn","Добавить");
  addBtn.onclick=()=>{const host=inp.value.trim().toLowerCase().replace(/^\*\.?/,"");if(!host){toast("Введите домен",true);return;}
    if(rules.some(r=>r.host===host)){toast("Уже есть",true);return;}
    rules.push({host,action:act});persist();inp.value="";render();toast("Добавлено");};
  add.append(f,f2,addBtn);m.append(add);

  m.append(el("div","group-label","Правила"));
  const listWrap=el("div","rows");m.append(listWrap);

  function render(){
    listWrap.innerHTML="";
    if(rules.length===0){listWrap.append(el("div","empty","Нет правил. Все домены идут через VPN."));return;}
    rules.forEach((r,i)=>{
      const sel=select([{v:"direct",t:"Напрямую"},{v:"vpn",t:"Через VPN"}],r.action,v=>{r.action=v;persist();});
      const rowEl=row(r.host,r.action==="direct"?"мимо VPN":"через VPN",sel);
      const del=el("button","more","✕");del.style.marginLeft="4px";
      del.onclick=()=>{rules.splice(i,1);persist();render();};
      rowEl.append(del);
      listWrap.append(rowEl);
    });
  }
  render();
}

function inputRow(title,value,onSave){
  const inp=el("input","inp");inp.value=value||"";
  inp.onchange=()=>onSave(inp.value.trim());
  return row(title,null,inp);
}
function backBtn(href){const b=el("button","back","‹");b.onclick=()=>location.hash=href;return b;}

// ---------- router ----------
const routes={
  "":pageServers,"/":pageServers,"/servers":pageServers,"/add":pageAdd,
  "/settings":pageSettings,"/settings/advanced":pageAdvanced,
  "/apps":pageApps,"/domains":pageDomains,
  "/stats":pageStats,"/logs":pageLogs,"/about":pageAbout,
};
function route(){serversPaint=null;statsPaint=null;const h=location.hash.replace(/^#/,"")||"/servers";
  (routes[h]||pageServers)();}
window.addEventListener("hashchange",route);

// live refresh
setInterval(async()=>{await refreshState();if(serversPaint)serversPaint();if(statsPaint&&location.hash.includes("stats"))pageStats();},2000);

(async()=>{await loadSettings();route();})();
</script>
